# meatshop.neo-crm.ru — Next.js storefront on :4000.
#
# ВАЖНО: здесь НЕТ `location /api/ -> Strapi`. Под /api/ живут собственные
# API-роуты Next (NextAuth /api/auth/session, /api/bids, /api/contact,
# /api/orders/confirm, /api/products/[id]). Если проксировать /api/ в Strapi,
# все они отвечают 404/405 (CLIENT_FETCH_ERROR у NextAuth).
#
# Браузер и SSR ходят в Strapi напрямую через https://strapi.neo-crm.ru
# (API_URL/BACK_URL в frontend/.env), медиа — тоже оттуда, поэтому
# /uploads/ здесь не нужен.
#
# Этот server-блок заменяет блок meatshop.neo-crm.ru в
# /etc/nginx/sites-available/minicrm (upstream plusshop_next определён там же).

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name meatshop.neo-crm.ru;

    ssl_certificate /etc/letsencrypt/live/neo-crm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neo-crm.ru/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/neo-crm.ru/chain.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MiniCrmSSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;

    # Всё, включая /api/* (роуты Next + NextAuth), идёт в Next.js
    location / {
        proxy_pass http://plusshop_next;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
